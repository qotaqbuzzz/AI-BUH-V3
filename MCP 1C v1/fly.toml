# fly.toml app configuration file generated for ai-buh-v3 on 2026-06-16T12:26:50+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-buh-v3'
primary_region = 'ams'

[build]

[env]
  ENTITIES_DIR = '/app/Entities'
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

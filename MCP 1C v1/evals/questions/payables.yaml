# Accounts payable eval questions (кредиторская задолженность)

- id: AP-001
  domain: payables
  question_ru: "Какая общая кредиторская задолженность на сегодня?"
  question_en: "What is the total accounts payable as of today?"
  expected:
    type: returns_value
    currency: KZT
  must_call: [onec_answer]
  must_cite_source: true

- id: AP-002
  domain: payables
  question_ru: "Кредиторская задолженность на 01.06.2026"

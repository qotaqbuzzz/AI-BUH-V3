# Accounts receivable eval questions (дебиторская задолженность)
# expected.type values:
#   returns_value   — any non-zero numeric value in the answer
#   no_error        — tool must not return isError:true
#   amount          — exact amount within tolerance_pct (fill in after first live run)
# must_cite_source: true → trail must have ≥1 ProvenanceRecord

- id: AR-001
  domain: receivables
  question_ru: "Какая общая дебиторская задолженность на сегодня?"
  question_en: "What is the total accounts receivable as of today?"
  expected:
    type: returns_value
    currency: KZT
  must_call: [onec_answer]
  must_cite_source: true

- id: AR-002
  domain: receivables
